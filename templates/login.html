{% extends "base.html" %}
{% block title %}登录 - 二次元交流站{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center text-theme mb-4"><i class="bi bi-box-arrow-in-right"></i> 登录</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="remember" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">记住我</label>
                    </div>
                    <button type="submit" class="btn btn-theme w-100">登录</button>
                </form>
                <p class="text-center mt-3 mb-0">还没有账号？<a href="{{ url_for('register') }}">立即注册</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
