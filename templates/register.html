{% extends "base.html" %}
{% block title %}注册 - 二次元交流站{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center text-theme mb-4"><i class="bi bi-person-plus"></i> 注册</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-control" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认密码</label>
                        <input type="password" name="confirm" class="form-control" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-theme w-100">注册</button>
                </form>
                <p class="text-center mt-3 mb-0">已有账号？<a href="{{ url_for('login') }}">去登录</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
