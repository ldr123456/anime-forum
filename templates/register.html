{% extends "base.html" %}
{% block title %}注册 - 二次元交流站{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="glass-card">
            <div class="card-body p-4 p-md-5">
                <h3 class="text-center gradient-text mb-4"><i class="bi bi-person-plus"></i> 注册</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #2d1b4e;">登录名 <span class="text-danger">*</span></label>
                        <input type="text" name="username" class="form-control form-control-lg" required autofocus
                               placeholder="用于登录的账号名" minlength="2">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #2d1b4e;">昵称 <small class="text-muted">（选填）</small></label>
                        <input type="text" name="nickname" class="form-control form-control-lg"
                               placeholder="你的二次元网名" maxlength="30">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #2d1b4e;">邮箱 <span class="text-danger">*</span></label>
                        <input type="email" name="email" class="form-control form-control-lg" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #2d1b4e;">密码</label>
                        <input type="password" name="password" class="form-control form-control-lg" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #2d1b4e;">确认密码</label>
                        <input type="password" name="confirm" class="form-control form-control-lg" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-gradient w-100 btn-lg">注册</button>
                </form>
                <p class="text-center mt-3 mb-0">已有账号？<a href="{{ url_for('login') }}" class="fw-bold">去登录</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
