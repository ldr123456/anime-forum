{% extends "base.html" %}
{% block title %}发布帖子 - 二次元交流站{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-theme mb-4"><i class="bi bi-pencil-square"></i> 发布新帖</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">选择分类</label>
                        <select name="category_id" class="form-select" required>
                            <option value="">-- 请选择分类 --</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.icon }} {{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">标题</label>
                        <input type="text" name="title" class="form-control" required
                               placeholder="给你的帖子起个标题吧~" maxlength="200">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">内容</label>
                        <textarea name="content" class="form-control" rows="10" required
                                  placeholder="写下你想说的内容..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-theme"><i class="bi bi-send"></i> 发布</button>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
