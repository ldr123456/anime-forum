{% extends "base.html" %}
{% block title %}发布帖子 - 二次元交流站{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">
        <div class="glass-card">
            <div class="card-body p-4 p-md-5">
                <h3 class="gradient-text mb-4 text-center">
                    <i class="bi bi-pencil-square"></i> 发布新帖
                </h3>
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: #2d1b4e;">
                            <i class="bi bi-folder2"></i> 选择分类
                        </label>
                        <select name="category_id" class="form-select form-select-lg" required>
                            <option value="">-- 请选择分类 --</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.icon }} {{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: #2d1b4e;">
                            <i class="bi bi-type"></i> 标题
                        </label>
                        <input type="text" name="title" class="form-control form-control-lg" required
                               placeholder="给你的帖子起个吸引人的标题吧~" maxlength="200">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: #2d1b4e;">
                            <i class="bi bi-chat-square-text"></i> 内容
                        </label>
                        <textarea name="content" class="form-control form-control-lg" rows="12" required
                                  placeholder="写下你想说的内容... 支持 Markdown 语法"></textarea>
                    </div>
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-gradient btn-lg">取消</a>
                        <button type="submit" class="btn btn-gradient btn-lg">
                            <i class="bi bi-send-fill"></i> 发布帖子
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
